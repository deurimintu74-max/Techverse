<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechVerse Tools</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fb;
color:#222;
}

header{
background:linear-gradient(135deg,#4f46e5,#06b6d4);
color:white;
padding:25px 8%;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.logo{
font-size:28px;
font-weight:bold;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
}

.hero{
text-align:center;
padding:60px 20px;
background:white;
}

.hero h1{
font-size:50px;
margin-bottom:10px;
}

.container{
max-width:1200px;
margin:auto;
padding:50px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.card h3{
margin-bottom:10px;
}

button{
padding:10px 18px;
background:#4f46e5;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

textarea,input{
width:100%;
padding:10px;
margin-top:10px;
}

.result{
margin-top:10px;
font-weight:bold;
color:#4f46e5;
}

footer{
background:#111827;
color:white;
text-align:center;
padding:25px;
margin-top:40px;
}
</style>
</head>

<body>

<header>
<nav>
<div class="logo">TechVerse</div>

<div>
<a href="index.html">Home</a>
<a href="blog.html">Blog</a>
<a href="tools.html">Tools</a>
</div>
</nav>
</header>

<section class="hero">
<h1>TechVerse Tools</h1>
<p>Free tools for students and beginners</p>
</section>

<div class="container">

<div class="grid">

<div class="card">
<h3>🔐 Password Generator</h3>

<button onclick="generatePassword()">
Generate Password
</button>

<div class="result" id="passwordResult"></div>
</div>

<div class="card">
<h3>📝 Word Counter</h3>

<textarea id="wordText"
placeholder="Type text here..."></textarea>

<button onclick="countWords()">
Count Words
</button>

<div class="result" id="wordResult"></div>
</div>

<div class="card">
<h3>🤖 AI Prompt Generator</h3>

<button onclick="generatePrompt()">
Generate Prompt
</button>

<div class="result" id="promptResult"></div>
</div>

<div class="card">
<h3>📏 Character Counter</h3>

<textarea id="charText"
placeholder="Type text here..."></textarea>

<button onclick="countCharacters()">
Count Characters
</button>

<div class="result" id="charResult"></div>
</div>

</div>

</div>

<footer>
<h3>TechVerse</h3>
<p>Founded by Naijel Deuri</p>
<p>Instagram: @Naijel_fr</p>
<p>© 2026 TechVerse</p>
</footer>

<script>

function generatePassword(){

let chars =
"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";

let password = "";

for(let i=0;i<12;i++){

password += chars.charAt(
Math.floor(Math.random()*chars.length)
);

}

document.getElementById("passwordResult")
.innerText=password;

}

function countWords(){

let text =
document.getElementById("wordText").value.trim();

let count =
text === "" ? 0 : text.split(/\s+/).length;

document.getElementById("wordResult")
.innerText="Words: "+count;

}

function generatePrompt(){

let prompts = [

"Explain AI to a beginner.",

"Create a study timetable for exams.",

"Write a blog post about technology.",

"Suggest a startup idea using AI.",

"Teach HTML in simple language."

];

let random =
prompts[Math.floor(Math.random()*prompts.length)];

document.getElementById("promptResult")
.innerText=random;

}

function countCharacters(){

let text =
document.getElementById("charText").value;

document.getElementById("charResult")
.innerText="Characters: "+text.length;

}

</script>

</body>
</html>
